# Local development stack with hot reload on both sides. This is
# deliberately NOT the same as the production Dockerfile (which bakes a
# static frontend build into the backend image for Cloud Run) - here the
# frontend runs its own Vite dev server so component edits show up instantly,
# and Vite's proxy (see frontend/vite.config.js) forwards /api and /ws calls
# to the backend container.
#
# Usage:
#   cp .env.example .env   # fill in whatever you have; everything has a
#                           # safe dry-run default so this works out of the box
#   docker compose up
#
# Dashboard:  http://localhost:5173
# API docs:   http://localhost:8000/docs
name: switchboard

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  mongo_data:
  frontend_node_modules:
